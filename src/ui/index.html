<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VESPER — Intelligence Vocale Avancée</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <!-- Animated Background -->
    <div class="mesh-bg">
        <div class="blob-1"></div>
        <div class="blob-2"></div>
    </div>

    <!-- Main Dashboard -->
    <main class="dashboard" id="app">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="brand">
                <i data-lucide="zap"></i>
                VESPER<span>.AI</span>
            </div>

            <nav>
                <ul class="nav-links">
                    <li class="nav-item" data-route="home">
                        <a href="/" data-link>
                            <i data-lucide="mic-2"></i>
                            <span>Interaction</span>
                        </a>
                    </li>
                    <li class="nav-item" data-route="models">
                        <a href="/models" data-link>
                            <i data-lucide="cpu"></i>
                            <span>Modèles IA</span>
                        </a>
                    </li>
                    <li class="nav-item" data-route="history">
                        <a href="/history" data-link>
                            <i data-lucide="message-square"></i>
                            <span>Historique</span>
                        </a>
                    </li>
                    <li class="nav-item" data-route="voices">
                        <a href="/voices" data-link>
                            <i data-lucide="volume-2"></i>
                            <span>Synthèse Vocale</span>
                        </a>
                    </li>
                    <li class="nav-item" data-route="settings">
                        <a href="/settings" data-link>
                            <i data-lucide="settings"></i>
                            <span>Paramètres</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="system-monitor" style="padding: 1rem; background: rgba(0,0,0,0.2); border-radius: var(--radius-md);">
                    <div style="display: flex; justify-content: space-between; font-size: 0.6rem; color: var(--text-tertiary); text-transform: uppercase; margin-bottom: 4px;">
                        <span>Latence</span>
                        <span id="latency-val">24ms</span>
                    </div>
                    <div class="volume-bar" style="height: 2px;">
                        <div class="volume-fill" id="sidebar-volume" style="width: 45%;"></div>
                    </div>
                    <div style="display: flex; align-items: center; gap: 6px; font-size: 0.65rem; margin-top: 8px;">
                        <span class="dot" style="width: 6px; height: 6px; background: var(--accent-secondary);"></span>
                        <span style="color: var(--text-secondary);">Vesper 2.5 Core</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Dynamic Content Area -->
        <div id="content-area" class="content-wrapper">
            <!-- Content will be injected here -->
            <div class="view-loader">
                <div class="spinner"></div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>

</html>
